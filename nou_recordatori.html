<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESPECTRE – Nou recordatori</title>
<link rel="stylesheet" href="styles.css">

</head>
<body>
<div class="phone"><div class="topbar"><a href="notificacions.html" class="back-btn">← Tornar</a><span class="title">Nou recordatori</span><a href="notificacions.html" class="right-btn">Desa</a></div>
<div class="screen" style="padding-top:0">
  <div class="scroll-area">
    <div class="field"><label>Tipus *</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <div style="background:var(--blu-ll);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer;min-width:64px"><div style="font-size:22px">🏥</div><div class="text-xs text-muted font-bold" style="margin-top:4px">Cita mèdica</div></div>
        <div style="background:var(--blu);border-radius:10px;padding:10px;text-align:center;cursor:pointer;min-width:64px;border:2px solid var(--blu-d)"><div style="font-size:22px">🧠</div><div class="text-xs font-bold" style="color:#fff;margin-top:4px">Teràpia</div></div>
        <div style="background:var(--blu-ll);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer;min-width:64px"><div style="font-size:22px">🎓</div><div class="text-xs text-muted font-bold" style="margin-top:4px">Escola</div></div>
        <div style="background:var(--blu-ll);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer;min-width:64px"><div style="font-size:22px">📝</div><div class="text-xs text-muted font-bold" style="margin-top:4px">Altre</div></div>
      </div>
    </div>
    <div class="field"><label>Descripció *</label><input class="input" value="Sessió de logopèdia"></div>
    <div class="field"><label>Data *</label><div class="input-row"><span>📅 Dimecres, 5 de maig 2026</span><span class="arrow">▼</span></div></div>
    <div class="field"><label>Hora *</label><div class="input-row"><span>🕒 15:00</span><span class="arrow">▼</span></div></div>
    <div class="field"><label>Repetició</label>
      <div class="chips"><span class="chip">Mai</span><span class="chip active">Setmanal</span><span class="chip">Quinzenal</span><span class="chip">Mensual</span></div>
    </div>
    <div class="field"><label>Avís previ</label>
      <div class="chips"><span class="chip">15 min</span><span class="chip">1 hora</span><span class="chip active">1 dia</span><span class="chip">2 dies</span></div>
    </div>
    <div class="field"><label>Per a</label><div class="input-row"><span>👶 Martina Molina</span><span class="arrow">▼</span></div></div>
    <a href="notificacions.html" class="btn">Desar recordatori</a>
    <a href="notificacions.html" class="btn-outline">Cancel·la</a>
  </div>
</div></div>
<script src="nav.js"></script>
</body>
</html>
