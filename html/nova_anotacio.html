<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESPECTRE – Nova anotació</title>
<link rel="stylesheet" href="styles.css">

</head>
<body>
<div class="phone"><div class="topbar"><a href="perfil_habilitats.html" class="back-btn">← Tornar</a><span class="title">Nova anotació</span><button class="right-btn" onclick="history.back()">Desa</button></div>
<div class="screen" style="padding-top:0">
  <div class="scroll-area">
    <p class="text-xs text-muted mb-14">Per a: Martina · 10 abr 2026 — 16:32</p>
    <div class="field"><label>Tipus d'anotació *</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div style="border:2px solid var(--blu);border-radius:12px;padding:12px 8px;text-align:center;background:var(--blu-ll);cursor:pointer"><div style="font-size:22px">🌟</div><div style="font-size:12px;font-weight:700;color:var(--blu)">Assoliment</div></div>
        <div style="border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer"><div style="font-size:22px">⚠️</div><div style="font-size:12px;color:var(--text2)">Dificultat</div></div>
        <div style="border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer"><div style="font-size:22px">🔄</div><div style="font-size:12px;color:var(--text2)">Canvi</div></div>
        <div style="border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer"><div style="font-size:22px">📝</div><div style="font-size:12px;color:var(--text2)">Nota</div></div>
      </div>
    </div>
    <div class="field"><label>Descripció *</label><textarea class="input" rows="5" placeholder="Escriu l'observació...">Gran dia a l'escola! Ha fet contacte visual amb un nou company per primera vegada.</textarea></div>
    <div class="field"><label>Afegir foto (opcional)</label>
      <div style="border:1.5px dashed var(--border);border-radius:12px;padding:18px;text-align:center;cursor:pointer;background:var(--blu-ll)"><div style="font-size:24px;margin-bottom:4px">📷</div><div style="font-size:13px;color:var(--text2)">Fer foto o seleccionar de la galeria</div><div class="text-xs text-muted mt-8">Màx. 5 MB</div></div>
    </div>
    <div class="check-row"><div class="check-sq">✓</div><div class="check-text">Afegir al resum de progrés setmanal</div></div>
    <a href="perfil_habilitats.html" class="btn mt-14">Desar anotació</a>
    <a href="perfil_habilitats.html" class="btn-outline">Cancel·la</a>
  </div>
</div></div>
<script src="nav.js"></script>
</body>
</html>
