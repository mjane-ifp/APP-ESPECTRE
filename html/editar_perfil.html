<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESPECTRE – Editar perfil</title>
<link rel="stylesheet" href="styles.css">

</head>
<body>
<div class="phone"><div class="topbar"><a href="perfil_habilitats.html" class="back-btn">← Tornar</a><span class="title">Editar perfil</span><button class="right-btn" onclick="history.back()">Desa</button></div>
<div class="screen" style="padding-top:0">
  <div class="scroll-area">
    <div style="background:var(--blu-ll);border-radius:14px;padding:14px;margin-bottom:16px;display:flex;gap:12px;align-items:center">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--blu-l);border:2.5px solid var(--blu);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:var(--blu-d);flex-shrink:0">M</div>
      <div><div style="font-size:14px;font-weight:700;color:var(--text)">Martina Molina</div><div style="font-size:12px;color:var(--blu);cursor:pointer">📷 Canviar foto de perfil</div></div>
    </div>
    <div class="field"><label>Nom *</label><input class="input" value="Martina"></div>
    <div class="field"><label>Cognoms</label><input class="input" value="Molina García"></div>
    <div class="field"><label>Data de naixement</label><input class="input" value="15/03/2018"></div>
    <div class="field"><label>Escola</label><input class="input" value="CEIP Montserrat"></div>
    <div class="field"><label>Curs</label><input class="input" value="2n de primària"></div>
    <div class="field"><label>Diagnòstic</label>
      <div class="input-row"><span>TEA nivell de suport 1</span><span class="arrow">▼</span></div>
    </div>
    <div class="field"><label>Necessitats específiques</label>
      <div class="chips">
        <span class="chip active" onclick="toggleChip(this)">Comunicació</span>
        <span class="chip active" onclick="toggleChip(this)">Sensorial</span>
        <span class="chip active" onclick="toggleChip(this)">Social</span>
        <span class="chip" onclick="toggleChip(this)">Autonomia</span>
        <span class="chip" onclick="toggleChip(this)">Son</span>
      </div>
    </div>
    <a href="perfil_habilitats.html" class="btn">Desar canvis</a>
    <div style="margin-top:20px;padding-top:14px;border-top:1px solid var(--border)">
      <div class="text-sm text-red text-center" style="cursor:pointer">⚠️ Eliminar perfil del nen/a</div>
    </div>
  </div>
</div></div>
<script src="nav.js"></script>
</body>
</html>
