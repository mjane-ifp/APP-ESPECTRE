  <rect x="8" y="16" width="44" height="32" rx="10" fill="#4A8EC4"/>
  <rect x="14" y="22" width="10" height="10" rx="5" fill="white"/>
  <rect x="36" y="22" width="10" height="10" rx="5" fill="white"/>

</svg></div>
    <div class="step-dots"><div class="step-dot active"></div><div class="step-dot"></div><div class="step-dot"></div></div>

    <div class="login-sub">Pas 1 de 3 · Dades personals</div>
  </div>
  <div class="login-body">
    <div class="field"><label>Nom i cognoms *</label><input class="input" type="text" placeholder="Ana Molina"></div>
    <div class="field"><label>Correu electrònic *</label><input class="input" type="email" placeholder="exemple@gmail.com"></div>
    <div class="field"><label>Contrasenya * (mínim 8 caràcters)</label><input class="input" type="password" placeholder="••••••••"></div>
    <div class="field"><label>Confirmar contrasenya *</label><input class="input" type="password" placeholder="••••••••"></div>
    <div class="check-row"><div class="check-sq">✓</div><div class="check-text">He llegit i accepto els <a href="#">Termes d'ús</a> i la <a href="#">Política de privacitat</a></div></div>
    <div class="check-row"><div class="check-sq empty"></div><div class="check-text">Accepto rebre consells personalitzats (opcional)</div></div>
    <a href="reg2.html" class="btn mt-20">Continua → Dades del nen/a</a>
    <p class="text-center mt-14 text-sm text-muted">Ja tens compte? <a href="login.html" class="text-blu font-bold">Inicia sessió</a></p>
