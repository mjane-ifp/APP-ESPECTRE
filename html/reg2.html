<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESPECTRE – Onboarding pas 2</title>
<link rel="stylesheet" href="styles.css">

</head>
<body>
<div class="phone">
<div class="screen">
  <div class="login-header">
    <div class="step-dots"><div class="step-dot"></div><div class="step-dot active"></div><div class="step-dot"></div></div>
    <div class="login-title">Parla'ns del teu fill/a 👶</div>
    <div class="login-sub">Pas 2 de 3 · Informació confidencial</div>
  </div>
  <div class="login-body">
    <div class="field"><label>Nom del nen/a *</label><input class="input" type="text" placeholder="ex. Martina"></div>
    <div class="field"><label>Data de naixement *</label><input class="input" type="text" placeholder="dd/mm/aaaa"></div>
    <div class="field">
      <label>Gènere</label>
      <div class="chips">
        <span class="chip active" onclick="selectChip('gen',this)" data-group="gen">Nena</span>
        <span class="chip" onclick="selectChip('gen',this)" data-group="gen">Nen</span>
        <span class="chip" onclick="selectChip('gen',this)" data-group="gen">Prefereixo no dir</span>
      </div>
    </div>
    <div class="field"><label>Escola (opcional)</label><input class="input" type="text" placeholder="ex. CEIP Montserrat"></div>
    <div class="field"><label>Curs (opcional)</label><input class="input" type="text" placeholder="ex. 2n de primària"></div>
    <div class="card-blue text-xs text-muted">🔒 Les dades del teu fill no es compartiran mai sense el teu consentiment.</div>
    <a href="reg3.html" class="btn">Continua → Diagnòstic</a>
    <a href="home.html" class="btn-outline">Fer-ho més tard</a>
  </div>
</div></div>
<script src="nav.js"></script>
</body>
</html>
