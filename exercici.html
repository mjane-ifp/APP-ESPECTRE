<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESPECTRE – Exercici actiu</title>
<link rel="stylesheet" href="styles.css">

</head>
<body>
<div class="phone">
<style>
#ex-circle { transition: transform .6s ease; }
</style>
<div class="topbar"><a href="benestar.html" class="back-btn">← Tornar</a><span class="title">Respiració guiada</span><div style="width:34px"></div></div>

    <div id="ex-circle" style="width:168px;height:168px;border-radius:50%;background:var(--blu-l);border:6px solid var(--blu);display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:24px">

    <div class="text-sm text-muted mb-8">● ○ ○ ○  ·  Pas 1 de 4</div>
    <div style="background:var(--blu-l);border-radius:10px;padding:8px 20px;margin-bottom:24px;font-size:13px;color:var(--blu-d);font-weight:700">Cicle 2 de 4</div>
    <a href="benestar.html" class="btn" style="width:240px;margin-bottom:10px">⏸ Pausar</a>

      <div class="text-sm font-bold text-blu">💡 Consell</div>

    </div>
  </div>
