<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESPECTRE – Sol·licitar cita</title>
<link rel="stylesheet" href="styles.css">

</head>
<body>
<div class="phone"><div class="topbar"><a href="prof_perfil.html" class="back-btn">← Tornar</a><span class="title">Sol·licitar cita</span><div style="width:34px"></div></div>
<div class="screen" style="padding-top:0">
  <div class="scroll-area">
    <div style="background:var(--blu-ll);border-radius:12px;padding:12px;margin-bottom:14px;display:flex;gap:10px;align-items:center"><div class="prof-avatar" style="width:38px;height:38px;font-size:13px;flex-shrink:0">MP</div><div><div style="font-size:14px;font-weight:700;color:var(--text)">Dra. Marta Puig</div><div class="text-xs text-muted">Psicòloga TEA · Barcelona</div></div></div>
    <div class="field"><label>Motiu de la consulta *</label><textarea class="input" rows="3" placeholder="Orientació familiar i gestió de rutines"></textarea></div>
    <div class="field"><label>Modalitat *</label>
      <div class="modality-row">
        <div class="modality-opt active">💻 Online</div>
        <div class="modality-opt">📍 Presencial</div>
      </div>
    </div>
    <div class="field"><label>Data preferida *</label><div class="input-row"><span>📅 Dimecres, 4 de maig 2026</span><span class="arrow">▼</span></div></div>
    <div class="field"><label>Hora preferida *</label>
      <div class="time-chips">
        <span class="time-chip active">10:00</span>
        <span class="time-chip">11:00</span>
        <span class="time-chip">16:00</span>
        <span class="time-chip">17:00</span>
      </div>
    </div>
    <div class="field"><label>Telèfon de contacte (opcional)</label><input class="input" type="tel" placeholder="ex. 634 123 456"></div>
    <div class="card-blue text-sm mb-14">ℹ️ La Dra. Puig et contactarà en 24-48h per confirmar la cita.</div>
    <a href="conf_cita.html" class="btn">Enviar sol·licitud de cita</a>
    <a href="prof_perfil.html" class="btn-outline">Cancel·la</a>
  </div>
</div></div>
<script src="nav.js"></script>
</body>
</html>
